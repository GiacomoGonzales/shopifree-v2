apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

// CI can override versionCode/versionName and signing via gradle.properties.
def ciVersionCode = (project.hasProperty('APP_VERSION_CODE')) ? project.APP_VERSION_CODE.toInteger() : 1
def ciVersionName = (project.hasProperty('APP_VERSION_NAME')) ? project.APP_VERSION_NAME : "1.0"

// White-label builds: mobile/build-config.ts writes whitelabel.properties with
// the store-specific APP_ID. Falls back to the main Shopifree id when absent
// so the default app keeps building cleanly.
def whitelabelAppId = "app.shopifree.mobile"
def whitelabelPropsFile = file('whitelabel.properties')
if (whitelabelPropsFile.exists()) {
    def whitelabelProps = new Properties()
    whitelabelPropsFile.withInputStream { whitelabelProps.load(it) }
    whitelabelAppId = whitelabelProps.getProperty('APP_ID', whitelabelAppId)
}

android {
    namespace "app.shopifree.mobile"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId whitelabelAppId
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode ciVersionCode
        versionName ciVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            // CI build: reads from gradle.properties (populated by the workflow).
            // Local dev fallback: reuses the original shopifree-release.jks so `cap open android` still works.
            if (project.hasProperty('RELEASE_STORE_FILE')) {
                storeFile file(project.RELEASE_STORE_FILE)
                storePassword project.RELEASE_STORE_PASSWORD
                keyAlias project.RELEASE_KEY_ALIAS
                keyPassword project.RELEASE_KEY_PASSWORD
            } else {
                storeFile file('shopifree-release.jks')
                storePassword 'shopifree2026'
                keyAlias 'shopifree'
                keyPassword 'shopifree2026'
            }
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

configurations.all {
    resolutionStrategy {
        force "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
        force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
        force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlin_version"
        force "androidx.browser:browser:1.8.0"
    }
}

apply from: 'capacitor.build.gradle'

// google-services.json is registered for the main Shopifree package only.
// For white-label builds (different applicationId) the plugin would fail
// because the JSON has no matching client. Skip it in that case — push
// notifications and native Google Sign-in won't work for those builds until
// each white-label package is registered in the Firebase Console.
try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text && servicesJSON.text.contains("\"package_name\": \"${whitelabelAppId}\"")) {
        apply plugin: 'com.google.gms.google-services'
    } else {
        logger.lifecycle("Skipping google-services plugin: applicationId '${whitelabelAppId}' is not registered in google-services.json")
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
